<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 md:p-6">

<div class="max-w-sm md:max-w-md mx-auto mt-20 md:mt-24">

<div class="glass p-6 md:p-10 rounded-2xl">

<h2 class="text-xl md:text-2xl font-bold text-center mb-6 md:mb-8">
Admin <span class="text-blue-500;">Login</span>
</h2>

<form method="POST" class="space-y-4">

<div>
    <label class="block text-sm font-medium mb-2">Email</label>
    <input type="email" name="email" placeholder="Admin Email" class="w-full">
</div>

<div>
    <label class="block text-sm font-medium mb-2">Password</label>
    <input type="password" name="password" placeholder="Password" class="w-full">
</div>

<button class="btn-crazy w-full mt-4">Authorize Access</button>

</form>

</div>

</div>

</body>
</html>
