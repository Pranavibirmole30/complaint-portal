<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4">

<div class="form-box glass">

<h2 class="text-xl md:text-2xl font-bold text-center mb-6">Register</h2>

<form method="POST" class="space-y-4">

<label class="block text-sm font-medium mb-2">Name</label>
<input type="text" name="name" placeholder="Your Name" class="w-full">

<label class="block text-sm font-medium mb-2">Email</label>
<input type="email" name="email" placeholder="Your Email" class="w-full">

<label class="block text-sm font-medium mb-2">Password</label>
<input type="password" name="password" placeholder="Your Password" class="w-full">

<button class="btn-crazy w-full mt-4">Register</button>

</form>

<p class="text-center text-sm text-gray-400 mt-4">
    Already have an account? <a href="/login" class="text-blue-500 hover:underline">Login here</a>
</p>

</div>
</body>
</html>
