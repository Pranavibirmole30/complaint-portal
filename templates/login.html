<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VoiceOut</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-4 md:p-6">

    <nav class="p-4 md:p-6 flex flex-col sm:flex-row justify-between items-center gap-4 sm:gap-0 max-w-7xl mx-auto">
        <a href="/" class="font-black text-lg md:text-xl text-blue-500">VOICEOUT.</a>
        <a href="/" class="text-gray-400 hover:text-white">← Back Home</a>
    </nav>

    <div class="glass max-w-md mx-auto mt-12 md:mt-20 p-6 md:p-10">
        <h3 class="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-center">Welcome Back</h3>
        <form method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2">Email</label>
                <input name="email" placeholder="Email Address" required class="w-full">
            </div>
            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" name="password" placeholder="Password" required class="w-full">
            </div>
            <button class="btn-crazy w-full mt-2">Sign In</button>
        </form>
        <div class="mt-6 text-center text-sm text-gray-400">
            Don't have an account? <a href="/register" class="text-blue-500 hover:underline">Register here</a>
        </div>
    </div>

</body>
</html>
