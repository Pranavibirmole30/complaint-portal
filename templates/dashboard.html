<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 md:p-6">

<div class="max-w-4xl md:max-w-5xl mx-auto mt-12 md:mt-20 text-center">

    <div class="glass p-6 md:p-10 rounded-2xl">

        <h2 class="text-lg md:text-xl font-semibold mb-6 md:mb-8">What would you like to do?</h2>

        <div class="flex flex-col sm:flex-row gap-4 md:gap-5 justify-center flex-wrap">

            <a href="/submit" class="btn-crazy">Submit Complaint</a>

            <a href="/view" class="btn-crazy">View Complaints</a>

    </div>
