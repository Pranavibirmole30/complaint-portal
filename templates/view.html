<!DOCTYPE html>
<html>
<head>
    <title>View Complaints</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div style="max-width:1100px;margin:60px auto;">

<h1 style="text-align:center;margin-bottom:40px;">Submitted Complaints</h1>
<div style="text-align:center;margin-bottom:30px;">

<button class="btn-crazy" onclick="filterComplaints('all')">All</button>
<button class="btn-crazy" onclick="filterComplaints('Pending')">Pending</button>
<button class="btn-crazy" onclick="filterComplaints('In Progress')">In Progress</button>
<button class="btn-crazy" onclick="filterComplaints('Resolved')">Resolved</button>

</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;">

{% for c in complaints %}

<div class="glass complaint-card" data-status="{{ c[4] }}" style="padding:20px;border-radius:20px;">

<img src="/uploads/{{ c[5] }}" style="width:100%;height:200px;object-fit:cover;border-radius:12px;margin-bottom:15px;">

<h3 style="color:#3b82f6;">{{ c[1] }}</h3>

<p><b>Description:</b> {{ c[2] }}</p>
<p><b>Location:</b> {{ c[3] }}</p>

<p>
<b>Status:</b> 
<span style="color:
{% if c[4]=='Pending' %}orange
{% elif c[4]=='Resolved' %}lightgreen
{% else %}skyblue
{% endif %}
;">
{{ c[4] }}
</span>
</p>

</div>

{% endfor %}

</div>

<div style="text-align:center;margin-top:40px;">
<a href="/dashboard">
<button class="btn-crazy">Back to Dashboard</button>
</a>
</div>

</div>

<script>

function filterComplaints(status){

let cards = document.querySelectorAll(".complaint-card");

cards.forEach(card => {

if(status === "all"){
card.style.display = "block";
}
else{
if(card.getAttribute("data-status") === status){
card.style.display = "block";
}
else{
card.style.display = "none";
}
}

});

}

</script>

</body>
</html>
