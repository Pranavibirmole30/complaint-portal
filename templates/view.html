<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Complaints</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 md:p-6">

<div class="max-w-5xl md:max-w-6xl mx-auto mt-8 md:mt-12">

<h1 class="text-2xl md:text-4xl font-bold text-center mb-8 md:mb-10">Submitted Complaints</h1>

<div class="flex flex-wrap justify-center gap-3 md:gap-4 mb-6 md:mb-8">

<button class="btn-crazy text-sm" onclick="filterComplaints('all')">All</button>
<button class="btn-crazy text-sm" onclick="filterComplaints('Pending')">Pending</button>
<button class="btn-crazy text-sm" onclick="filterComplaints('In Progress')">In Progress</button>
<button class="btn-crazy text-sm" onclick="filterComplaints('Resolved')">Resolved</button>

</div>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">

{% for c in complaints %}

<div class="glass complaint-card p-5 rounded-2xl">

<img src="/uploads/{{ c[5] }}" class="w-full h-48 object-cover rounded-xl mb-4">

<h3 class="text-blue-500 font-bold text-lg mb-2">{{ c[1] }}</h3>

<p class="text-sm"><b>Description:</b> {{ c[2] }}</p>
<p class="text-sm"><b>Location:</b> {{ c[3] }}</p>

<p class="text-sm">
<b>Status:</b>
<span class="{% if c[4]=='Pending' %}text-orange-400{% elif c[4]=='Resolved' %}text-green-400{% else %}text-sky-400{% endif %}">
{{ c[4] }}
</span>
</p>

</div>

{% endfor %}

</div>

<div class="text-center mt-8 md:mt-10">
    <a href="/dashboard">
        <button class="btn-crazy">Back to Dashboard</button>
    </a>
</div>

</div>

<script>

function filterComplaints(status){

let cards = document.querySelectorAll(".complaint-card");

cards.forEach(card => {

if(status === "all"){
card.style.display = "block";
}
else{
if(card.getAttribute("data-status") === status){
card.style.display = "block";
}
else{
card.style.display = "none";
}
}

});

}

</script>

</body>
</html>
