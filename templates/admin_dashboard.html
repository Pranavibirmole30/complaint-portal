<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4 md:p-6">

<div class="max-w-5xl md:max-w-6xl mx-auto mt-8 md:mt-12">

<div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 md:mb-10">
    <h1 class="text-2xl md:text-3xl font-bold">Admin <span class="text-blue-500;">Console</span></h1>

    <a href="/logout" class="logout-btn">Logout</a>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6">

{% for c in complaints %}

<div class="glass p-4 md:p-5 rounded-2xl">

<img src="/uploads/{{ c[5] }}" class="w-full h-40 md:h-44 object-cover rounded-xl mb-4">

<h3 class="text-blue-500 font-semibold mb-2">{{ c[1] }}</h3>

<p class="text-sm mb-3"><b>Location:</b> {{ c[3] }}</p>



<form action="/update_status/{{ c[0] }}" method="post" class="space-y-3">

<select name="status" class="w-full">

<option value="Pending" {% if c[4]=='Pending' %}selected{% endif %}>Pending</option>

<option value="In Progress" {% if c[4]=='In Progress' %}selected{% endif %}>In Progress</option>

<option value="Resolved" {% if c[4]=='Resolved' %}selected{% endif %}>Resolved</option>

</select>

<div class="flex flex-col sm:flex-row gap-2">
    <button class="btn-crazy flex-1 text-sm py-2">Update Status</button>
    <button class="btn-crazy bg-red-500 hover:bg-red-600 flex-1 text-sm py-2"
    formaction="/delete_complaint/{{ c[0] }}"
    onclick="return confirm('Delete this complaint?')">

    Delete

    </button>
</div>

</form>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
