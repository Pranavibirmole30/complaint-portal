<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div style="max-width:1100px;margin:60px auto;">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:40px;">
<h1>Admin <span style="color:#3b82f6;">Console</span></h1>

<a href="/logout" class="nav-link">Logout</a>
</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:25px;">

{% for c in complaints %}

<div class="glass" style="padding:20px;border-radius:20px;">

<img src="/uploads/{{ c[5] }}" style="width:100%;height:180px;object-fit:cover;border-radius:12px;margin-bottom:15px;">

<h3 style="color:#3b82f6;">{{ c[1] }}</h3>

<p><b>Location:</b> {{ c[3] }}</p>



<form action="/update_status/{{ c[0] }}" method="post">

<select name="status">

<option value="Pending" {% if c[4]=='Pending' %}selected{% endif %}>Pending</option>

<option value="In Progress" {% if c[4]=='In Progress' %}selected{% endif %}>In Progress</option>

<option value="Resolved" {% if c[4]=='Resolved' %}selected{% endif %}>Resolved</option>

</select>

<button class="btn-crazy" style="margin-top:10px;">Update Status</button>

</form>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
